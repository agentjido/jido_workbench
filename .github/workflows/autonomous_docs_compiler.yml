name: Autonomous Docs Compiler

on:
  push:
    branches:
      - main
    paths:
      - 'priv/content_plan/docs/**/*.md'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_regen:
        description: 'Force regenerate all published plans'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  compile_docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout agentjido_xyz
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.18'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install Dependencies
        run: mix deps.get

      - name: Compile Application
        run: mix compile

      - name: Run Documentation Compiler Pipeline
        env:
          SPRITES_TOKEN: ${{ secrets.SPRITES_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.force_regen }}" = "true" ]; then
            echo "Running full regeneration of all content plans..."
            mix jido_lib.github.docs.generate_all priv/content_plan/docs \
              --provider claude \
              --output-repo agentjido/agentjido_xyz
          else
            echo "Processing changed content plans only..."
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^priv/content_plan/docs/.*\.md$' || true)

            if [ -z "$CHANGED_FILES" ]; then
              echo "No content plan changes detected."
              exit 0
            fi

            for file in $CHANGED_FILES; do
              echo "Processing: $file"
              mix jido_lib.github.docs.pipeline "$file" \
                --provider claude \
                --output-repo agentjido/agentjido_xyz
            done
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(auto): compiler-verified documentation update"
          branch: "docs/auto-compile-${{ github.run_id }}"
          title: "Compiler-Verified Documentation Update"
          body: |
            This PR was autonomously generated by the Jido Documentation Compiler.

            - **Grounding:** 100% verified against main branch source code.
            - **Execution:** All Elixir code blocks compiled and ran successfully in the Sprite sandbox.
            - **Interactive:** Kino playgrounds have been appended where applicable.
          labels: "documentation, automated pr"
